<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar gasto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>✏️ Editar gasto</h1>

        <form method="POST" class="formulario">
            <input type="text" name="descripcion" value="{{ gasto['descripcion'] }}" required>
            <input type="number" step="0.01" name="monto" value="{{ gasto['monto'] }}" required>
            <input type="text" name="categoria" value="{{ gasto['categoria'] }}">
            <button type="submit">Guardar cambios</button>
        </form>

        <a href="/">⬅ Volver</a>
    </div>
</body>
</html>

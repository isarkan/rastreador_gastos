<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar gasto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>✏️ Editar gasto</h1>

        <form method="POST" class="formulario">
            <input type="text" name="descripcion" value="{{ gasto['descripcion'] }}" required>
            <input type="number" step="0.01" name="monto" value="{{ gasto['monto'] }}" required>
            <select name="categoria" required>
                <option value="Comidas diarias" {% if gasto['categoria'] == 'Comidas diarias' %}selected{% endif %}>🍽️ Comidas diarias</option>
                <option value="Remesa" {% if gasto['categoria'] == 'Remesa' %}selected{% endif %}>🛒 Remesa</option>
                <option value="Aseo" {% if gasto['categoria'] == 'Aseo' %}selected{% endif %}>🧼 Aseo</option>
                <option value="Gastos hormiga" {% if gasto['categoria'] == 'Gastos hormiga' %}selected{% endif %}>☕ Gastos hormiga</option>
                <option value="Transporte" {% if gasto['categoria'] == 'Transporte' %}selected{% endif %}>🚕 Transporte</option>
                <option value="Servicios" {% if gasto['categoria'] == 'Servicios' %}selected{% endif %}>💡 Servicios</option>
                <option value="Ocio" {% if gasto['categoria'] == 'Ocio' %}selected{% endif %}>🎉 Ocio</option>
                <option value="Salud" {% if gasto['categoria'] == 'Salud' %}selected{% endif %}>💊 Salud</option>
                <option value="Educación" {% if gasto['categoria'] == 'Educación' %}selected{% endif %}>📚 Educación</option>
                <option value="Otros" {% if gasto['categoria'] == 'Otros' %}selected{% endif %}>📦 Otros</option>
            </select>            <button type="submit">Guardar cambios</button>
        </form>

        <a href="/">⬅ Volver</a>
    </div>
</body>
</html>
